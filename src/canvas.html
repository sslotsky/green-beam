<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=1">
  <title>Lumitone</title>
  <meta property="og:title" content="Lumitone" />
  <meta property="og:description" content="Play, record, and share music on a virtual piano" />
  <meta property="og:image" content="/og-home.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Lumitone" />
  <meta name="twitter:description" content="Play, record, and share music on a virtual piano" />
  <meta name="twitter:image" content="/og-home.png" />
  <style>
    * { scrollbar-width: thin; scrollbar-color: #444 #111; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #00ff40; }
    body { margin: 0; background: #000; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
    .sidebar { width: 240px; max-height: 100dvh; background: #111; border-right: 1px solid #333; padding: 16px; display: flex; flex-direction: column; gap: 16px; box-sizing: border-box; flex-shrink: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .sidebar h1 { margin: 0; font-size: 16px; color: #00ff40; font-family: sans-serif; letter-spacing: 1px; }
    .sidebar label { color: #888; font-size: 11px; font-family: sans-serif; text-transform: uppercase; letter-spacing: 0.5px; }
    .sidebar select { width: 100%; padding: 6px 8px; font-size: 13px; border-radius: 4px; background: #222; color: #fff; border: 1px solid #444; }
    .canvas-area { flex: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    piano-app { display: flex; flex: 1; min-height: 0; }
    canvas { display: block; }
    button { padding: 6px 14px; font-size: 14px; border-radius: 4px; border: 1px solid #555; background: #222; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 6px; width: 100%; justify-content: center; }
    button:hover { background: #333; }

    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 10; }
    .overlay.open { display: flex; }
    .modal { background: #1a1a1a; border: 1px solid #444; border-radius: 8px; padding: 24px; min-width: 340px; max-height: 70dvh; display: flex; flex-direction: column; gap: 16px; color: #fff; font-family: sans-serif; overflow: hidden; }
    .modal h2 { margin: 0; font-size: 18px; }
    .modal ul { list-style: none; margin: 0; padding: 0; overflow-y: auto; flex: 1; min-height: 0; }
    .modal li { padding: 10px 12px; border-radius: 4px; cursor: pointer; display: flex; justify-content: space-between; gap: 12px; }
    .modal li > span:first-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
    .modal li > span:last-child { white-space: nowrap; flex-shrink: 0; }
    .modal li:hover { background: #333; }
    .modal li.selected { background: #00ff40; color: #000; }
    .modal .actions { display: flex; gap: 8px; justify-content: flex-end; }
    .modal button { font-size: 14px; width: auto; }
    .modal .play-btn { background: #00ff40; color: #000; border-color: #00ff40; }
    .modal .play-btn:hover { background: #00cc33; }
    .modal .empty { color: #888; font-style: italic; padding: 12px 0; }
    .tabs { display: flex; gap: 0; }
    .tab-btn { flex: 1; border-radius: 4px 4px 0 0 !important; border-bottom: 2px solid transparent !important; background: #111 !important; color: #888 !important; }
    .tab-btn.active { background: #222 !important; color: #fff !important; border-bottom-color: #00ff40 !important; }
    .modal .delete-btn { background: none; border: none; font-size: 16px; padding: 0 4px; cursor: pointer; opacity: 0.4; filter: grayscale(1); width: auto; }
    .modal .delete-btn:hover { opacity: 1; filter: none; }
    .midi-track-list { display: flex; flex-direction: column; gap: 2px; max-height: 150px; overflow-y: auto; }
    .midi-track { padding: 4px 6px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; font-size: 12px; font-family: sans-serif; color: #ccc; background: #1a1a1a; gap: 4px; }
    .midi-track:hover { background: #222; }
    .midi-track.selected { background: #00ff40; color: #000; }
    .midi-track .track-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; flex: 1; }
    .midi-track .track-btns { display: flex; gap: 2px; flex-shrink: 0; }
    .midi-track .track-btns button { width: auto; padding: 1px 5px; font-size: 10px; font-weight: bold; border-radius: 3px; background: #333; border: 1px solid #555; color: #888; min-width: 0; }
    .midi-track .track-btns button:hover { background: #444; }
    .midi-track .track-btns button.muted { background: #663300; color: #ffaa00; border-color: #ffaa00; }
    .midi-track .track-btns button.soloed { background: #003366; color: #44aaff; border-color: #44aaff; }
    .midi-track .track-btns button.vol-adjusted { background: #2a1a33; color: #bb77ff; border-color: #bb77ff; }
    .midi-track.active { animation: pulse 1.2s ease-in-out infinite; }
    .midi-track.active.selected { animation: pulse-selected 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
    @keyframes pulse-selected { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; } }
    .midi-drop-zone { border: 2px dashed #444; border-radius: 6px; padding: 32px 16px; text-align: center; cursor: pointer; }
    .midi-drop-zone.drag-over { border-color: #00ff40; background: rgba(0,255,64,0.05); }
    .midi-drop-label { color: #666; font-size: 13px; font-family: sans-serif; }
    .learn-btn { background: #1a1a1a; border-color: #00ff40; color: #00ff40; }
    .learn-btn:hover { background: #00ff40; color: #000; }
    .learn-modal .tab-content { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    .learn-modal .song-list li { font-size: 14px; }
    .midi-tracks { display: flex; flex-direction: column; gap: 8px; }
    .midi-song-name { font-size: 12px; color: #00ff40; font-family: sans-serif; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .midi-progress { height: 6px; background: #333; border-radius: 3px; overflow: hidden; cursor: pointer; }
    .midi-progress-fill { height: 100%; width: 0%; background: #00ff40; border-radius: 3px; }
    .midi-controls { display: flex; gap: 4px; }
    .midi-controls button { flex: 1; }
    .midi-fallback-warning { font-size: 11px; color: #e6a817; font-family: sans-serif; line-height: 1.3; }
    .rotate-hint { display: none; background: #1a1a00; color: #e6a817; text-align: center; padding: 6px; font-size: 12px; font-family: sans-serif; flex-shrink: 0; }
    @media (max-aspect-ratio: 1/1) { .rotate-hint { display: block; } }
  </style>
</head>
<body>
  <div class="rotate-hint">Rotate your device for the best experience</div>
  <piano-app>
    <div class="sidebar">
      <h1>LUMITONE</h1>
      <div>
        <label>Instrument</label>
        <instrument-selector></instrument-selector>
      </div>
      <record-button></record-button>
      <button class="learn-btn" onclick="document.querySelector('learn-modal').open()">Learn</button>
      <midi-player></midi-player>
    </div>
    <div class="canvas-area">
      <canvas width="1200" height="800"></canvas>
    </div>
    <star-field count="200"></star-field>
    <space-ship></space-ship>
    <piano-keyboard octaves="7" start-midi="24" offset-x="30" offset-y="100"></piano-keyboard>
    <stage-platform x="2" y="500" w="170"></stage-platform>
    <jukebox-display x="5" y="350"></jukebox-display>
    <amp-display x="88" y="360"></amp-display>
    <jukebox-modal></jukebox-modal>
    <midi-modal></midi-modal>
    <name-song-modal></name-song-modal>
    <learn-modal></learn-modal>
  </piano-app>

  <script src="https://unpkg.com/soundfont-player@0.12.0/dist/soundfont-player.js"></script>
  <script type="module" src="/js/main.js"></script>
  <script>
    function scaleCanvas() {
      const area = document.querySelector('.canvas-area');
      const canvas = document.querySelector('canvas');
      if (!area || !canvas) return;
      const scaleX = area.clientWidth / canvas.width;
      const scaleY = area.clientHeight / canvas.height;
      const scale = Math.min(scaleX, scaleY, 1);
      canvas.style.transform = `scale(${scale})`;
      canvas.style.transformOrigin = 'center center';
    }
    window.addEventListener('resize', scaleCanvas);
    window.addEventListener('load', scaleCanvas);
  </script>
</body>
</html>
